<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Soccer</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="home-screen">
        <h1>Head Soccer</h1>
        <form action="" method="post">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" />
          </div>
          <div class="form-group">
            <label for="playe1country">Player 1 Country</label>
            <input
              type="text"
              name="playe1country"
              class="form-control"
              id="playe1country"
            />
            <select
              name="player1country"
              id="player1country"
              class="form-control"
            >
              <option value="">Select Player 1</option>
              <option value="Brazil">Brazil</option>
              <option value="England">England</option>
              <option value="Spain">Spain</option>
              <option value="Japan">Japan</option>
              <option value="Netherlands">Netherlands</option>
              <option value="Portugal">Portugal</option>
              <option value="Germany">Germany</option>
              <option value="Italy">Italy</option>
            </select>
          </div>
          <div class="form-group">
            <label for="ball">Choose ball</label>
            <select name="ball" id="ball" class="form-control">
              <option value="01">Ball 01</option>
              <option value="02">Ball 02</option>
            </select>
          </div>
          <button class="btn">Play</button>
        </form>
      </div>
      <div class="game-screen">
        <canvas id="canvas" width="1000" height="600"></canvas>
      </div>
    </div>
    <!-- nah karena kita ga pke module makanya kita harus link dulu ke sini ya dan urutnnya itu harus bener-->
    <script src="./js/utils/util.js"></script>
    <script src="./js/gawang.js"></script>
    <script src="./js/player.js"></script>
    <script src="./js/ball.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
