<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Indonesia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main id="map-area">
        <div id="map-container">
            <img src="/assets/indonesia.svg" alt="map indonesia" id="map-img">
            <canvas id="lines-layer"></canvas>
            <div id="pinpoints-layer"></div>
        </div>
    </main>

    <div id="popup-add" class="popup hidden">
        <div id="popup-header">
            <span>Add Location</span>
            <img src="/assets/BiXLg.svg" alt="btn-close" id="close-add" class="close-add" title="icon close">
        </div>
        <form id="form-add">
            <input type="text" id="input-name" required>
        </form>
    </div>

    <div id="popup-connect" class="popup hidden">
        <div id="popup-header">
            <span>Connect Pin</span>
            <img src="/assets/BiXLg.svg" alt="icon close" title="icon close" id="connect-close">
        </div>
        <form id="form-connect">
            <input type="text" id="input-distance" required>
            <select name="input-mode" id="input-mode">
                <option value="">select mode</option>
                <option value="Train">Train</option>
                <option value="Bus">Bus</option>
                <option value="Airplane">Airplane</option>
            </select>
            <button id="btn-connect">connect</button>
        </form>
    </div>


    <script src="/js/main.js"></script>
</body>
</html>
