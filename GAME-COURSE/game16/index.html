<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Indonesia</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <main id="map-area">
        <div id="map-container">
            <img src="/assets/indonesia.svg" id="map-img"></img>
            <canvas id="lines-layer"></canvas>
            <div id="pinpoints-layer"></div>
        </div>
    </main>

    <div id="popup-add" class="popup hidden">
        <div id="popup-header">
            <span>Add Pin</span>
            <img src="/assets/BiXLg.svg" alt="" id="close-add">
        </div>
        <form  id="form-add">
            <input type="text" id="input-name" required placeholder="Name"> 
        </form>
    </div>


    <div id="popup-connect" class="popup hidden">
        <div id="popup-header">
            <span>Connect pin</span>
            <img src="/assets/BiXLg.svg" alt="" id="close-connect">
        </div>
        <form id="form-connect">
            <input type="text" id="input-distance">
            <select name="input-mode" id="input-mode">
                <option value="Select">Select</option>
                <option value="Train">Train</option>
                <option value="Bus">Bus</option>
                <option value="Airplane">Airplane</option>
            </select>
            <button id="submit-connect">Connect</button>
        </form>
    </div>
    


    <script src="js/main.js"></script>
</body>
</html>
